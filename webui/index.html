<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IB Bot — 交易控制台</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <div class="header-title">
      <span class="logo">📈 IB Bot</span>
      <span class="subtitle">期货交易控制台</span>
    </div>
    <div class="header-status">
      <span id="conn-badge" class="badge badge-offline">离线</span>
      <span id="clock" class="clock">--:--:--</span>
    </div>
  </header>

  <!-- ── 账户权益栏 ── -->
  <div id="account-bar" class="account-bar">
    <div class="acct-item">
      <div class="acct-label">账户净值</div>
      <div id="acct-net-liq" class="acct-val">—</div>
    </div>
    <div class="acct-item">
      <div class="acct-label">持仓浮盈</div>
      <div id="acct-unrealized-pnl" class="acct-val">—</div>
    </div>
    <div class="acct-item">
      <div class="acct-label" title="当前 IB session 内已平仓的累计盈亏">已实现</div>
      <div id="acct-realized-pnl" class="acct-val">—</div>
    </div>
    <div class="acct-item">
      <div class="acct-label">可用资金</div>
      <div id="acct-avail-funds" class="acct-val">—</div>
    </div>
  </div>

  <main>

    <!-- ── 合约监控卡片 ── -->
    <section>
      <h2>合约监控</h2>
      <div id="contracts-grid" class="contracts-grid">
        <div class="empty-hint">等待数据…</div>
      </div>
    </section>

    <!-- ── 手动交易面板 ── -->
    <section>
      <h2>手动交易</h2>
      <div class="panel">
        <div class="form-row">
          <label>合约</label>
          <select id="trade-key"></select>
        </div>
        <div class="form-row">
          <label>操作</label>
          <div class="btn-group">
            <button id="btn-open"  class="btn btn-trade active" onclick="setAction('open')">开仓</button>
            <button id="btn-close" class="btn btn-trade"        onclick="setAction('close')">平仓</button>
          </div>
        </div>
        <div class="form-row">
          <label>方向</label>
          <div class="btn-group">
            <button id="btn-long"  class="btn btn-long  active" onclick="setDirection('long')">做多 Long</button>
            <button id="btn-short" class="btn btn-short"        onclick="setDirection('short')">做空 Short</button>
          </div>
        </div>
        <div class="form-row">
          <label>类型</label>
          <div class="btn-group">
            <button id="btn-mkt" class="btn btn-otype active" onclick="setOrderType('market')">市价 Market</button>
            <button id="btn-lmt" class="btn btn-otype"        onclick="setOrderType('limit')">限价 Limit</button>
          </div>
        </div>
        <div class="form-row" id="row-qty">
          <label>手数</label>
          <input id="trade-qty" type="number" min="1" step="1" value="1" />
        </div>
        <div class="form-row" id="row-limit-price" style="display:none">
          <label>限价</label>
          <input id="trade-limit-price" type="number" step="0.25" placeholder="限价价格" />
        </div>
        <div class="form-row" id="row-stop-price">
          <label>止损价 <small style="color:var(--text-dim)">(可选)</small></label>
          <input id="trade-stop-price" type="number" step="0.25" placeholder="留空则不挂止损单" />
        </div>
        <div class="form-row">
          <button class="btn btn-primary" onclick="submitTrade()">提交</button>
        </div>
        <div id="trade-msg" class="msg"></div>
      </div>
    </section>

    <!-- ── 止损管理 ── -->
    <section>
      <h2>止损管理</h2>
      <div class="panel">
        <div class="form-row">
          <label>合约</label>
          <select id="stop-key"></select>
        </div>
        <div class="form-row">
          <label>止损价</label>
          <input id="stop-price" type="number" step="0.25" placeholder="新止损价" />
        </div>
        <div class="form-row" style="gap:8px">
          <button class="btn btn-warning" onclick="submitSetStop()">设置/修改止损</button>
          <button class="btn btn-secondary" onclick="submitCancelStop()">撤销止损单</button>
        </div>
        <div id="stop-msg" class="msg"></div>
      </div>
    </section>

    <!-- ── 策略参数 ── -->
    <section>
      <h2>策略参数</h2>
      <div class="panel">
        <div class="form-row">
          <label>双K止损信号</label>
          <div class="toggle-row">
            <label class="toggle-switch">
              <input type="checkbox" id="signal-enabled" onchange="setSignalEnabled(this.checked)" checked />
              <span class="toggle-slider"></span>
            </label>
            <span id="signal-label" class="toggle-label on">已启用</span>
          </div>
        </div>
        <div class="form-row">
          <label>信号冷却（秒）</label>
          <input id="param-cooldown" type="number" min="0" step="1" placeholder="30" />
        </div>
        <div class="form-row">
          <button class="btn btn-primary" onclick="saveStrategy()">保存冷却时间</button>
        </div>
        <div id="strategy-msg" class="msg"></div>
      </div>
    </section>

    <!-- ── 通知 ── -->
    <section>
      <h2>Telegram 通知</h2>
      <div class="panel">
        <div class="form-row">
          <button class="btn btn-secondary" onclick="testNotify()">发送测试消息</button>
        </div>
        <div id="notify-msg" class="msg"></div>
      </div>
    </section>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>

# ============================================================
# IBC 配置文件
# 文档: https://github.com/IbcAlpha/IBC/blob/master/userguide.md
# ============================================================

# ── IB 账号 ──────────────────────────────────────────────────
# 填写你的 IB 用户名和密码
IbLoginId=YOUR_IB_USERNAME
IbPassword=YOUR_IB_PASSWORD

# 交易模式: paper = 模拟盘 / live = 实盘
# 注意: 需与 config.yaml 中的端口对应
#   paper -> port: 4002
#   live  -> port: 4001
TradingMode=live

# ── IB Gateway 路径 ──────────────────────────────────────────
# 与 setup.sh 中 GATEWAY_DIR 一致
IbDir=/opt/ibgateway/

# ── 日志 ─────────────────────────────────────────────────────
LogLevel=INFO

# ── API 连接 ─────────────────────────────────────────────────
# 自动接受来自 127.0.0.1 的 API 连接请求（弹窗）
AcceptIncomingConnectionAction=accept

# 读写模式: no = 允许下单（止损平仓需要）
ReadOnlyApi=no

# ── 会话冲突处理 ─────────────────────────────────────────────
# 若账号在其他地方已登录，踢掉旧会话
ExistingSessionDetectedAction=primary

# ── 弹窗自动处理 ─────────────────────────────────────────────
AcceptBidAskLastSizeDisplayUpdateNotification=accept
DismissNSEComplianceDialog=accept
